<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE AI MEDIA COMPANY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #e5e5e5;
            --text-dim: #888;
            --accent: #00ff88;
            --border: #222;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Header */
        header { padding: 80px 0 60px; text-align: center; border-bottom: 1px solid var(--border); }
        h1 { font-size: clamp(2rem, 6vw, 4rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
        h1 span { color: var(--accent); }
        .tagline { font-size: 1rem; color: var(--text-dim); font-weight: 300; }
        .tagline span { color: var(--accent); }

        /* Content Grid */
        .content-section { padding: 60px 0; }
        .section-title { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

        /* Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: block;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .card-date { font-size: 0.75rem; color: var(--accent); margin-bottom: 12px; }
        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }
        .card-excerpt { font-size: 0.875rem; color: var(--text-dim); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; font-size: 0.75rem; }
        .card-tag { color: var(--text-dim); background: var(--bg); padding: 4px 8px; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            padding: 24px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            max-width: 640px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal { transform: translateY(0); }
        
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            line-height: 1;
        }
        .modal-close:hover { color: var(--accent); }
        
        .modal-date { font-size: 0.75rem; color: var(--accent); margin-bottom: 8px; }
        .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; line-height: 1.3; }
        .modal-body { font-size: 0.95rem; color: var(--text-dim); line-height: 1.8; white-space: pre-wrap; }
        .modal-meta { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; font-size: 0.75rem; }
        .modal-tag { color: var(--accent); background: var(--bg); padding: 4px 12px; }

        /* Footer */
        footer { padding: 60px 0; border-top: 1px solid var(--border); text-align: center; font-size: 0.875rem; color: var(--text-dim); }
        footer a { color: var(--accent); text-decoration: none; }
        .empty { text-align: center; padding: 80px 0; color: var(--text-dim); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>THE AI <span>MEDIA</span> COMPANY</h1>
            <p class="tagline">Built with <span>Toy</span> and <span>KiloClaw</span></p>
        </div>
    </header>

    <main class="container">
        <section class="content-section">
            <h2 class="section-title">Latest Content</h2>
            <div class="grid" id="content-grid"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 THE AI MEDIA COMPANY. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-date" id="modal-date"></div>
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-meta">
                <span class="modal-tag" id="modal-platform"></span>
            </div>
        </div>
    </div>

    <script>
    (function() {

        const content = [

                excerpt: "The remote workers who will outpace everyone else? They're the ones using AI.",
                platform: "LinkedIn",
                fullBody: `The remote workers who will outpace everyone else? They're the ones using AI. Not because AI is magic. Because it handles the work that drains your day.

            },
            {
                title: "One Person Business (Naval Ravikant Inspired)",
                date: "2026-04-04",
                excerpt: "The one-person business isn't a trend. It's the future.",
                platform: "Social",
                fullBody: `The one-person business isn't a trend. It's the future.

            },
            {
                title: "OpenClaw - Your Personal AI Infrastructure",
                date: "2026-04-04",
                excerpt: "OpenClaw isn't just another AI assistant. It's your personal AI infrastructure.",
                platform: "Facebook",
                fullBody: `OpenClaw isn't just another AI assistant. It's your personal AI infrastructure.

            {
                title: "Why Use KiloCode for Personal Productivity",

                excerpt: "Ever feel like you're drowning in tasks while AI tools sit unused?",
                platform: "Facebook",
                fullBody: `Ever feel like you're drowning in tasks while AI tools sit unused?

            {
                title: "Why People Should Learn AI",
                date: "2026-04-04",
                excerpt: "AI isn't the future anymore. It's right now.",
                platform: "Facebook",
                fullBody: `AI isn't the future anymore. It's right now.

        ];

        // DOM elements
        const grid = document.getElementById('content-grid');
        const modal = document.getElementById('modal');

        // Render cards
        function render() {
            if (!content.length) {
                grid.innerHTML = '<div class="empty">No content yet. Check back soon!</div>';
                return;
            }
            grid.innerHTML = content.map((item, i) => `
                <div class="card" onclick="openModal(${i})">
                    <div class="card-date">${item.date}</div>
                    <h3 class="card-title">${item.title}</h3>
                    <p class="card-excerpt">${item.excerpt}</p>
                    <div class="card-meta">
                        <span class="card-tag">${item.platform}</span>
                    </div>
                </div>
            `).join('');
        }

        // Modal functions
        window.openModal = function(index) {
            const item = content[index];
            document.getElementById('modal-date').textContent = item.date;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-body').textContent = item.fullBody || item.excerpt;
            document.getElementById('modal-platform').textContent = item.platform;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = function() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        };

        // Close on overlay click or Escape
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize
        render();
    })();
    </script>
</body>
</html>
